name: ZK-PoX CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: rust
        run: cargo build --workspace

      - name: Test
        working-directory: rust
        run: cargo test --workspace -- --nocapture

  android-cross-compile:
    name: Android NDK Cross-Compilation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-linux-android, armv7-linux-androideabi]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-ndk-${{ matrix.target }}-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-ndk-${{ matrix.target }}-

      - name: Build for Android (${{ matrix.target }})
        working-directory: rust
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          cargo ndk -t ${{ matrix.target }} build --release -p zkpox-mobile

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libzkpox_mobile-${{ matrix.target }}
          path: rust/target/${{ matrix.target }}/release/libzkpox_mobile.so
          if-no-files-found: warn

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        working-directory: rust
        run: cargo clippy --workspace -- -D warnings
